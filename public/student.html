<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>School Connect | Student Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #dadbd3; height: 100vh; display: flex; overflow: hidden; }

        /* ── LOGIN ── */
        #login-area {
            width: 100%; height: 100vh; background: white;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; gap: 15px; z-index: 1000; position: absolute;
            padding: 20px;
        }
        #login-area h2 { font-size: 24px; color: #075e54; }
        #login-area p  { color: gray; font-size: 14px; text-align: center; }
        #qr-upload {
            padding: 10px 20px; border: 2px dashed #075e54;
            border-radius: 10px; cursor: pointer; color: #075e54; font-weight: bold;
            max-width: 280px; width: 100%;
        }
        #status { color: red; font-size: 13px; text-align: center; }

        /* ── CHAT CONTAINER ── */
        #chat-container { display: none; width: 100%; height: 100vh; background: #fff; position: relative; }
        #chat-container.active { display: flex; }

        /* ── SIDEBAR ── */
        #sidebar {
            width: 30%; min-width: 300px; border-right: 1px solid #ddd;
            display: flex; flex-direction: column; background: #fff;
            transition: transform 0.25s ease;
        }
        .my-profile {
            background: #ededed; padding: 15px; display: flex; align-items: center;
            border-bottom: 1px solid #ddd; cursor: pointer; position: relative;
        }
        .my-profile:hover { background: #e0e0e0; }
        .tab-bar { display: flex; border-bottom: 2px solid #ddd; }
        .tab-btn {
            flex: 1; padding: 12px; text-align: center; cursor: pointer;
            font-weight: bold; font-size: 14px; color: #8696a0;
            border: none; background: white; transition: 0.2s;
        }
        .tab-btn.active { color: #075e54; border-bottom: 3px solid #075e54; }
        #student-list { flex: 1; overflow-y: auto; }

        /* ── AVATAR ── */
        .avatar {
            width: 45px; height: 45px; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px; margin-right: 12px;
            position: relative; flex-shrink: 0;
        }
        .status-dot {
            position: absolute; bottom: 2px; right: 2px;
            width: 12px; height: 12px; border-radius: 50%;
            border: 2px solid white; background: #8696a0;
        }

        /* ── STUDENT ITEM ── */
        .student-item {
            padding: 10px 15px; border-bottom: 1px solid #f2f2f2;
            cursor: pointer; display: flex; align-items: center; transition: background 0.2s;
        }
        .student-item:hover  { background: #f5f6f6; }
        .student-item.active-chat { background: #ebebeb; }
        .unread-badge {
            background: #25D366; color: white; border-radius: 10px;
            min-width: 20px; height: 20px; padding: 0 5px;
            font-size: 11px; display: flex; align-items: center;
            justify-content: center; margin-left: 8px; font-weight: bold; flex-shrink: 0;
        }

        /* ── SIDEBAR LAST MSG ── */
        .sidebar-sub {
            display: flex; align-items: center; margin-top: 2px;
            font-size: 12px; color: #8696a0; overflow: hidden;
        }
        .sidebar-status { font-size: 11px; margin-right: 3px; flex-shrink: 0; }
        .sidebar-status.grey { color: #8696a0; }
        .sidebar-status.blue { color: #53bdeb; }
        .sidebar-preview {
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
        }
        .sidebar-time { font-size: 11px; color: #aaa; margin-left: 4px; flex-shrink: 0; }

        /* ── MAIN CHAT ── */
        #main-chat { flex: 1; display: flex; flex-direction: column; background: #efeae2; min-width: 0; }
        #chat-header {
            background: #ededed; padding: 12px 16px; display: flex;
            align-items: center; border-bottom: 1px solid #ddd; min-height: 65px;
        }
        #no-chat-msg {
            flex: 1; display: flex; align-items: center; justify-content: center;
            color: #8696a0; font-size: 16px; flex-direction: column; gap: 10px;
        }
        #active-chat-info { display: none; align-items: center; width: 100%; }

        /* Back button — only mobile */
        #back-btn {
            display: none; background: none; border: none;
            font-size: 22px; cursor: pointer; color: #075e54;
            margin-right: 10px; padding: 4px 8px;
        }

        /* ── MESSAGES ── */
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg {
            margin-bottom: 4px; padding: 8px 12px; border-radius: 8px;
            max-width: 65%; font-size: 14.5px; word-wrap: break-word; position: relative;
        }
        .msg .time { font-size: 11px; color: #8696a0; float: right; margin-left: 10px; margin-top: 4px; }
        .sent     { background: #dcf8c6; align-self: flex-end; }
        .received { background: #fff;    align-self: flex-start; }
        .msg-status { display: block; font-size: 10px; margin-top: 3px; text-align: right; clear: both; }
        .sent-status      { color: #8696a0; }
        .delivered-status { color: #8696a0; }
        .seen-status      { color: #53bdeb; font-weight: bold; }

        /* ── INPUT ── */
        .input-bar { background: #f0f2f5; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        #msg-input {
            flex: 1; padding: 10px 15px; border: none; border-radius: 25px;
            outline: none; font-size: 15px; background: white;
        }
        #send-btn {
            border: none; background: #075e54; color: white; border-radius: 50%;
            width: 42px; height: 42px; cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        #send-btn:hover { background: #128c7e; }

        /* ── PROFILE DROPDOWN ── */
        #profile-dropdown {
            display: none; position: absolute; top: 70px; left: 0; right: 0;
            background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 999; border-radius: 0 0 10px 10px;
        }

        /* ════════════════════════════════════
           MOBILE  ≤ 640px
        ════════════════════════════════════ */
        @media (max-width: 640px) {
            #chat-container.active { display: block; position: relative; overflow: hidden; }

            #sidebar {
                width: 100%; min-width: unset;
                position: absolute; inset: 0; z-index: 10;
                transform: translateX(0);
            }
            #sidebar.hidden-mobile {
                transform: translateX(-100%);
                pointer-events: none;
            }

            #main-chat {
                position: absolute; inset: 0; z-index: 5;
                transform: translateX(100%);
                transition: transform 0.25s ease;
            }
            #main-chat.show-mobile {
                transform: translateX(0);
            }

            #back-btn { display: inline-flex; }

            .student-item { padding: 13px 15px; }
            .tab-btn { padding: 14px 8px; font-size: 13px; }

            .msg { max-width: 82%; font-size: 14px; }

            .input-bar { padding: 10px 10px; padding-bottom: max(10px, env(safe-area-inset-bottom)); }

            #no-chat-msg { display: none !important; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-area">
    <h2>🏫 School Connect</h2>
    <p>Apna QR Code upload karo login ke liye</p>
    <input type="file" id="qr-upload" accept="image/*">
    <canvas id="qr-canvas" style="display:none;"></canvas>
    <p id="status"></p>
</div>

<!-- CHAT -->
<div id="chat-container">
    <div id="sidebar">
        <div class="my-profile" id="my-profile-btn">
            <div class="avatar" id="my-avatar" style="background:#075e54;">?
                <span class="status-dot" style="background:#25D366;"></span>
            </div>
            <div style="flex:1;"><b id="my-name">Me</b><br><small style="color:#06d755;">Online</small></div>
            <span style="color:#888;">▼</span>
            <div id="profile-dropdown">
                <div style="padding:15px 20px; border-bottom:1px solid #f0f0f0;">
                    <div style="font-weight:bold;" id="dropdown-name">-</div>
                    <div style="font-size:12px; color:#888;" id="dropdown-class">-</div>
                </div>
                <div onclick="logout()" style="padding:14px 20px; cursor:pointer; color:#e53935; font-weight:bold; display:flex; align-items:center; gap:10px;">
                    🚪 Logout
                </div>
            </div>
        </div>
        <div class="tab-bar">
            <button class="tab-btn active" id="tab-private" onclick="switchTab('private')">💬 Private</button>
            <button class="tab-btn" id="tab-group" onclick="switchTab('group')">👥 Class Group</button>
        </div>
        <div id="student-list"></div>
    </div>

    <div id="main-chat">
        <div id="chat-header">
            <div id="no-chat-msg">
                <span style="font-size:40px;">💬</span>
                <span>Kisi classmate ko select karo ya Class Group kholo</span>
            </div>
            <div id="active-chat-info">
                <button id="back-btn" onclick="goBackToSidebar()">←</button>
                <div class="avatar" id="chat-avatar" style="background:#128c7e;">?
                    <span class="status-dot" id="chat-status-dot"></span>
                </div>
                <div>
                    <b id="chat-name"></b><br>
                    <small id="chat-status-text" style="color:gray;"></small>
                </div>
            </div>
        </div>
        <div id="messages"></div>
        <div class="input-bar">
            <input type="text" id="msg-input" placeholder="Type a message..."
                   onkeydown="if(event.key==='Enter') send()">
            <button id="send-btn" onclick="send()">➤</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
    // ── API URL: same origin when deployed, localhost in dev ──
    const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://localhost:5000'
        : window.location.origin;

    const TOKEN = () => localStorage.getItem('studentToken');

    let socket, myData;
    let classmates    = [];
    let activeChat    = null;
    let unreadCounts  = {};
    let lastMessages  = {};
    let currentTab    = 'private';
    let tokenRefreshTimer = null;

    // ── Load socket.io from same server ──
    function loadSocketIO() {
        return new Promise((resolve, reject) => {
            if (window.io) { resolve(); return; }
            const s = document.createElement('script');
            s.src = `${API_URL}/socket.io/socket.io.js`;
            s.onload  = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
        });
    }

    // ========================
    // AUTO LOGIN
    // ========================
    window.addEventListener('load', async () => {
        const savedToken   = localStorage.getItem('studentToken');
        const savedStudent = localStorage.getItem('studentData');
        const savedRefresh = localStorage.getItem('refreshToken');
        if (savedToken && savedStudent) {
            try {
                const payload   = JSON.parse(atob(savedToken.split('.')[1]));
                const isExpired = (payload.exp * 1000) < Date.now();
                if (!isExpired) {
                    myData = JSON.parse(savedStudent);
                    await loadSocketIO();
                    startApp();
                } else if (savedRefresh) {
                    const ok = await refreshAccessToken(savedRefresh);
                    if (ok) {
                        myData = JSON.parse(savedStudent);
                        await loadSocketIO();
                        startApp();
                    } else clearSession();
                } else clearSession();
            } catch(e) { clearSession(); }
        }
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('#my-profile-btn'))
            document.getElementById('profile-dropdown').style.display = 'none';
    });
    document.getElementById('my-profile-btn').addEventListener('click', () => {
        const dd = document.getElementById('profile-dropdown');
        dd.style.display = dd.style.display === 'block' ? 'none' : 'block';
    });

    // ========================
    // TOKEN REFRESH
    // ========================
    function scheduleTokenRefresh(token) {
        if (tokenRefreshTimer) clearTimeout(tokenRefreshTimer);
        try {
            const payload   = JSON.parse(atob(token.split('.')[1]));
            const refreshIn = Math.max((payload.exp * 1000) - Date.now() - 120000, 5000);
            tokenRefreshTimer = setTimeout(async () => {
                const rt = localStorage.getItem('refreshToken');
                if (rt) await refreshAccessToken(rt);
            }, refreshIn);
        } catch(e) {}
    }

    async function refreshAccessToken(refreshToken) {
        try {
            const res    = await fetch(`${API_URL}/api/auth/student/refresh`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ refreshToken })
            });
            const result = await res.json();
            if (result.success && result.accessToken) {
                localStorage.setItem('studentToken', result.accessToken);
                scheduleTokenRefresh(result.accessToken);
                return true;
            }
            return false;
        } catch(e) { return false; }
    }

    // ========================
    // LOGOUT
    // ========================
    function logout() {
        if (!confirm('Logout karna chahte ho?')) return;
        if (socket) socket.disconnect();
        if (tokenRefreshTimer) clearTimeout(tokenRefreshTimer);
        clearSession();
        document.getElementById('chat-container').classList.remove('active');
        document.getElementById('login-area').style.display = 'flex';
        document.getElementById('student-list').innerHTML = '';
        document.getElementById('messages').innerHTML    = '';
        myData = null; socket = null; classmates = [];
        activeChat = null; unreadCounts = {}; lastMessages = {};
    }

    function clearSession() {
        localStorage.removeItem('studentToken');
        localStorage.removeItem('refreshToken');
        localStorage.removeItem('studentData');
    }

    // ========================
    // QR LOGIN
    // ========================
    document.getElementById('qr-upload').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('status').innerText = "QR scan ho raha hai...";
        const reader = new FileReader();
        reader.onload = () => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('qr-canvas');
                const ctx    = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const code = jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data, canvas.width, canvas.height);
                if (code) {
                    try { attemptLogin(JSON.parse(code.data)); }
                    catch(e) { document.getElementById('status').innerText = "❌ Invalid QR data"; }
                } else {
                    document.getElementById('status').innerText = "❌ QR scan nahi hua";
                }
            };
            img.src = reader.result;
        };
        reader.readAsDataURL(file);
    };

    let pendingQRData = null;

    async function attemptLogin(qrData) {
        document.getElementById('status').innerText = "Login ho raha hai...";
        pendingQRData = qrData;
        try {
            const res    = await fetch(`${API_URL}/api/auth/student/qr-login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(qrData)
            });
            const result = await res.json();

            if (result.success) {
                await loadSocketIO();
                saveAndStart(result);
            } else if (result.needsVerify && result.deviceMatched) {
                showUsernamePrompt();
            } else {
                document.getElementById('status').innerText = "❌ " + (result.message || "Login failed");
            }
        } catch(err) {
            document.getElementById('status').innerText = "❌ Server se connect nahi hua";
        }
    }

    function showUsernamePrompt() {
        document.getElementById('status').innerText = '';
        document.getElementById('login-area').innerHTML = `
            <h2>🏫 School Connect</h2>
            <p style="color:#075e54;">Same device detected. Apna username enter karo:</p>
            <input type="text" id="username-input"
                style="padding:10px 16px;border:2px solid #075e54;border-radius:8px;font-size:15px;outline:none;max-width:280px;width:100%;"
                placeholder="Username">
            <button onclick="submitReLogin()"
                style="padding:10px 24px;background:#075e54;color:white;border:none;border-radius:8px;cursor:pointer;font-size:15px;max-width:280px;width:100%;">
                ✅ Login
            </button>
            <p id="status" style="color:red;font-size:13px;"></p>
        `;
    }

    async function submitReLogin() {
        const username = document.getElementById('username-input')?.value?.trim();
        if (!username) { document.getElementById('status').innerText = "Username khaali hai"; return; }
        document.getElementById('status').innerText = "Verify ho raha hai...";
        try {
            const res    = await fetch(`${API_URL}/api/auth/student/re-login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...pendingQRData, username })
            });
            const result = await res.json();
            if (result.success) {
                await loadSocketIO();
                saveAndStart(result);
            } else {
                document.getElementById('status').innerText = "❌ " + (result.message || "Failed");
            }
        } catch(err) {
            document.getElementById('status').innerText = "❌ Server error";
        }
    }

    function saveAndStart(result) {
        myData = result.student;
        localStorage.setItem('studentToken', result.accessToken);
        if (result.refreshToken) localStorage.setItem('refreshToken', result.refreshToken);
        localStorage.setItem('studentData', JSON.stringify(myData));
        scheduleTokenRefresh(result.accessToken);
        startApp();
    }

    // ========================
    // START APP
    // ========================
    async function startApp() {
        if (!myData) {
            try {
                const res    = await fetch(`${API_URL}/api/student/me`, { headers: { 'Authorization': `Bearer ${TOKEN()}` }});
                const result = await res.json();
                if (result.success) { myData = result.student; localStorage.setItem('studentData', JSON.stringify(myData)); }
                else { clearSession(); return; }
            } catch(e) { clearSession(); return; }
        }
        document.getElementById('login-area').style.display  = 'none';
        document.getElementById('chat-container').classList.add('active');
        document.getElementById('my-name').innerText = myData.username;
        document.getElementById('my-avatar').innerHTML =
            myData.username[0].toUpperCase() + '<span class="status-dot" style="background:#25D366;"></span>';
        document.getElementById('dropdown-name').innerText  = '👤 ' + myData.username;
        document.getElementById('dropdown-class').innerText = (myData.className || '') + ' • ' + (myData.schoolName || '');
        initSocket();
        await loadClassmates();
        classmates.forEach(s => {
            if (s.studentId !== myData.studentId) {
                socket.emit('join-private', { myStudentId: myData.studentId, otherStudentId: s.studentId });
            }
        });
        await loadInbox();
        setInterval(loadInbox, 30000);
    }

    // ========================
    // TABS
    // ========================
    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-private').classList.toggle('active', tab === 'private');
        document.getElementById('tab-group').classList.toggle('active',  tab === 'group');
        if (tab === 'group') openGroupChat();
        else { renderClassmates(); if (activeChat && activeChat.type === 'private') highlightActive(); }
    }

    // ========================
    // CLASSMATES
    // ========================
    async function loadClassmates() {
        try {
            const res    = await fetch(`${API_URL}/api/student/classmates`, { headers: { 'Authorization': `Bearer ${TOKEN()}` }});
            const result = await res.json();
            classmates   = Array.isArray(result) ? result : (result.classmates || []);
            renderClassmates();
        } catch(err) { console.error("Classmates load error:", err); }
    }

    // ========================
    // INBOX
    // ========================
    async function loadInbox() {
        try {
            const res    = await fetch(`${API_URL}/api/chat/inbox`, { headers: { 'Authorization': `Bearer ${TOKEN()}` }});
            const result = await res.json();
            if (!result.success) return;
            Object.entries(result.inbox).forEach(([otherId, data]) => {
                updateLastMessage(otherId, data.lastText, data.lastTime, data.isMe, data.seen, data.delivered);
                const chatIsOpen = activeChat && activeChat.type === 'private' &&
                                   activeChat.student && activeChat.student.studentId === otherId;
                if (!chatIsOpen && data.unread > 0) {
                    unreadCounts[otherId] = data.unread;
                }
            });
            renderClassmates();
            if (activeChat && activeChat.type === 'private') highlightActive();
        } catch(err) { console.error("Inbox load error:", err); }
    }

    // ========================
    // RENDER SIDEBAR
    // ========================
    function renderClassmates() {
        const listDiv = document.getElementById('student-list');
        listDiv.innerHTML = "";
        classmates.filter(s => s.studentId !== myData.studentId).forEach(s => {
            const item     = document.createElement('div');
            item.className = 'student-item';
            item.id        = `user-${s.studentId}`;
            item.onclick   = () => openPrivateChat(s);

            const color      = s.isOnline ? "#25D366" : "#8696a0";
            const statusText = s.isOnline ? "Online" : `Last seen ${formatTime(s.lastSeen)}`;
            const unread     = unreadCounts[s.studentId] || 0;
            const lm         = lastMessages[s.studentId];

            let subHtml = '';
            if (lm) {
                let statusIcon = '';
                if (lm.isMe) {
                    if (lm.seen)           statusIcon = `<span class="sidebar-status blue">✓✓</span>`;
                    else if (lm.delivered) statusIcon = `<span class="sidebar-status grey">✓✓</span>`;
                    else                   statusIcon = `<span class="sidebar-status grey">✓</span>`;
                }
                subHtml = `
                    <div class="sidebar-sub">
                        ${statusIcon}
                        <span class="sidebar-preview">${escHtml(lm.text)}</span>
                        <span class="sidebar-time">${formatTime(lm.time)}</span>
                    </div>`;
            } else {
                subHtml = `<div class="sidebar-sub"><span class="sidebar-preview" style="color:gray;">${statusText}</span></div>`;
            }

            item.innerHTML = `
                <div class="avatar" style="background:#128c7e;">${s.username[0].toUpperCase()}
                    <span class="status-dot" id="dot-${s.studentId}" style="background:${color};"></span>
                </div>
                <div class="sidebar-info" style="margin-left:12px;flex:1;overflow:hidden;min-width:0;">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <b style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;">${escHtml(s.username)}</b>
                    </div>
                    ${subHtml}
                </div>
                ${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ''}
            `;
            listDiv.appendChild(item);
        });
    }

    function highlightActive() {
        document.querySelectorAll('.student-item').forEach(el => el.classList.remove('active-chat'));
        if (activeChat && activeChat.type === 'private') {
            const el = document.getElementById(`user-${activeChat.student.studentId}`);
            if (el) el.classList.add('active-chat');
        }
    }

    function updateLastMessage(studentId, text, time, isMe, seen, delivered) {
        const prev = lastMessages[studentId];
        lastMessages[studentId] = {
            text:      text.length > 35 ? text.slice(0,35)+'…' : text,
            time,
            isMe:      isMe      !== undefined ? isMe      : (prev ? prev.isMe      : false),
            seen:      seen      !== undefined ? seen      : (prev ? prev.seen      : false),
            delivered: delivered !== undefined ? delivered : (prev ? prev.delivered : false)
        };
    }

    function updateSidebarItem(studentId) {
        const s = classmates.find(x => x.studentId === studentId);
        if (!s) return;
        const el = document.getElementById(`user-${studentId}`);
        if (!el) { renderClassmates(); if(activeChat) highlightActive(); return; }

        const lm     = lastMessages[studentId];
        const unread = unreadCounts[studentId] || 0;

        let subHtml = '';
        if (lm && lm.text) {
            let statusIcon = '';
            if (lm.isMe) {
                if (lm.seen)           statusIcon = `<span class="sidebar-status blue">✓✓</span>`;
                else if (lm.delivered) statusIcon = `<span class="sidebar-status grey">✓✓</span>`;
                else                   statusIcon = `<span class="sidebar-status grey">✓</span>`;
            }
            subHtml = `<div class="sidebar-sub">
                ${statusIcon}
                <span class="sidebar-preview">${escHtml(lm.text)}</span>
                <span class="sidebar-time">${formatTime(lm.time)}</span>
            </div>`;
        } else {
            const statusText = s.isOnline ? "Online" : `Last seen ${formatTime(s.lastSeen)}`;
            subHtml = `<div class="sidebar-sub"><span class="sidebar-preview" style="color:gray;">${statusText}</span></div>`;
        }

        const infoDiv = el.querySelector('.sidebar-info');
        if (infoDiv) {
            infoDiv.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <b style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;">${escHtml(s.username)}</b>
                </div>
                ${subHtml}`;
        }

        let badge = el.querySelector('.unread-badge');
        if (unread > 0) {
            if (!badge) {
                badge = document.createElement('div');
                badge.className = 'unread-badge';
                el.appendChild(badge);
            }
            badge.innerText = unread;
        } else {
            if (badge) badge.remove();
        }
    }

    // ========================
    // OPEN PRIVATE CHAT
    // ========================
    async function openPrivateChat(student) {
        activeChat = { type: 'private', student };
        unreadCounts[student.studentId] = 0;
        updateSidebarItem(student.studentId);
        highlightActive();
        showChat();

        document.getElementById('no-chat-msg').style.display      = 'none';
        document.getElementById('active-chat-info').style.display = 'flex';
        document.getElementById('chat-avatar').innerHTML =
            student.username[0].toUpperCase() + '<span class="status-dot" id="chat-status-dot"></span>';
        document.getElementById('chat-name').innerText = student.username;
        document.getElementById('chat-status-dot').style.background =
            student.isOnline ? "#25D366" : "#8696a0";
        document.getElementById('chat-status-text').innerText =
            student.isOnline ? "Online" : `Last seen ${formatTime(student.lastSeen)}`;

        socket.emit('join-private', { myStudentId: myData.studentId, otherStudentId: student.studentId });
        document.getElementById('messages').innerHTML = "";

        try {
            const res    = await fetch(`${API_URL}/api/chat/private/history/${student.studentId}`, {
                headers: { 'Authorization': `Bearer ${TOKEN()}` }
            });
            const result = await res.json();
            if (result.success) {
                const msgs = result.messages;
                msgs.forEach((m, i) => {
                    const isMe   = m.senderStudentId === myData.studentId;
                    const isLast = isMe && !msgs.slice(i+1).some(x => x.senderStudentId === myData.studentId);
                    appendMessage(m.senderName, m.text, m.createdAt, isMe, m._id, m.isDelivered, m.isRead, m.seenAt, isLast);
                });
                if (msgs.length > 0) {
                    const last  = msgs[msgs.length - 1];
                    const isMe  = last.senderStudentId === myData.studentId;
                    const seen      = isMe && !!last.seenAt;
                    const delivered = isMe && (!!last.isDelivered || !!last.seenAt);
                    updateLastMessage(student.studentId, last.text, last.createdAt, isMe, seen, delivered);
                    updateSidebarItem(student.studentId);
                    highlightActive();
                }
                scrollBottom();
            }
        } catch(err) { console.error("History error:", err); }
    }

    // ========================
    // OPEN GROUP CHAT
    // ========================
    async function openGroupChat() {
        activeChat = { type: 'group' };
        showChat();
        document.getElementById('no-chat-msg').style.display      = 'none';
        document.getElementById('active-chat-info').style.display = 'flex';
        document.getElementById('chat-avatar').innerHTML =
            '👥<span class="status-dot" id="chat-status-dot" style="background:#25D366;"></span>';
        document.getElementById('chat-name').innerText = `Class ${myData.className} Group`;
        const onlineCount = classmates.filter(s => s.isOnline && s.studentId !== myData.studentId).length + 1;
        document.getElementById('chat-status-text').innerText = `${onlineCount} online`;

        document.getElementById('messages').innerHTML = "";
        try {
            const res    = await fetch(`${API_URL}/api/chat/group/history`, { headers: { 'Authorization': `Bearer ${TOKEN()}` }});
            const result = await res.json();
            if (result.success) {
                result.messages.forEach(m => {
                    const isMe = m.senderStudentId === myData.studentId;
                    appendMessage(m.senderName, m.text, m.createdAt, isMe, m._id, false, false, null, false);
                });
                scrollBottom();
            }
        } catch(err) { console.error("Group history error:", err); }
    }

    // ========================
    // SEND
    // ========================
    async function send() {
        const input = document.getElementById('msg-input');
        const text  = input.value.trim();
        if (!text || !activeChat) return;
        input.value = '';
        try {
            if (activeChat.type === 'private') {
                const res    = await fetch(`${API_URL}/api/chat/private/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN()}` },
                    body: JSON.stringify({ receiverStudentId: activeChat.student.studentId, text })
                });
                const result = await res.json();
                if (!result.success) { alert(result.message || "Send failed"); input.value = text; }
            } else {
                const res    = await fetch(`${API_URL}/api/chat/group/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN()}` },
                    body: JSON.stringify({ text })
                });
                const result = await res.json();
                if (!result.success) { alert(result.message || "Send failed"); input.value = text; }
            }
        } catch(err) { console.error("Send error:", err); input.value = text; }
    }

    // ========================
    // SOCKET
    // ========================
    function initSocket() {
        socket = io(API_URL);
        socket.emit('join-class', { studentId: myData.studentId, className: myData.className });

        socket.on('connect', () => {
            socket.emit('join-class', { studentId: myData.studentId, className: myData.className });
            classmates.forEach(s => {
                if (s.studentId !== myData.studentId) {
                    socket.emit('join-private', { myStudentId: myData.studentId, otherStudentId: s.studentId });
                }
            });
        });

        socket.on('status-update', (data) => {
            const c = classmates.find(x => x.studentId === data.studentId);
            if (c) { c.isOnline = data.isOnline; if (!data.isOnline) c.lastSeen = data.lastSeen; }
            const dot = document.getElementById(`dot-${data.studentId}`);
            if (dot) dot.style.background = data.isOnline ? "#25D366" : "#8696a0";
            if (activeChat && activeChat.type === 'private' && activeChat.student.studentId === data.studentId) {
                const hdot = document.getElementById('chat-status-dot');
                if (hdot) hdot.style.background = data.isOnline ? "#25D366" : "#8696a0";
                document.getElementById('chat-status-text').innerText =
                    data.isOnline ? "Online" : `Last seen ${formatTime(data.lastSeen)}`;
                activeChat.student.isOnline = data.isOnline;
                if (!data.isOnline) activeChat.student.lastSeen = data.lastSeen;
            }
        });

        socket.on('new-private-msg', (data) => {
            const isMe    = data.senderStudentId === myData.studentId;
            const otherId = isMe ? data.receiverStudentId : data.senderStudentId;

            const chatIsOpen = activeChat && activeChat.type === 'private' &&
                               activeChat.student && activeChat.student.studentId === otherId;

            if (chatIsOpen) {
                if (isMe) {
                    removeAllMsgStatus();
                    appendMessage(data.senderName, data.text, data.createdAt, true, data._id, data.isDelivered, false, null, true);
                } else {
                    removeAllMsgStatus();
                    appendMessage(data.senderName, data.text, data.createdAt, false, data._id, false, false, null, false);
                    socket.emit('mark-seen', { myStudentId: myData.studentId, otherStudentId: data.senderStudentId });
                }
                scrollBottom();
            } else if (!isMe) {
                unreadCounts[data.senderStudentId] = (unreadCounts[data.senderStudentId] || 0) + 1;
                const badge = document.querySelector(`#user-${data.senderStudentId} .unread-badge`);
                const cnt   = unreadCounts[data.senderStudentId];
                if (badge) {
                    badge.innerText = cnt;
                } else {
                    const el = document.getElementById(`user-${data.senderStudentId}`);
                    if (el) {
                        const b = document.createElement('div');
                        b.className = 'unread-badge';
                        b.innerText = cnt;
                        el.appendChild(b);
                    }
                }
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.value = 880;
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
                } catch(e) {}
            }

            updateLastMessage(otherId, data.text, data.createdAt, isMe, false, isMe ? !!data.isDelivered : true);
            updateSidebarItem(otherId);
            if (activeChat && activeChat.type === 'private') highlightActive();
        });

        socket.on('msgs-seen', (data) => {
            const iAmSender  = data.otherStudentId === myData.studentId;
            const chatIsOpen = activeChat && activeChat.type === 'private' &&
                               activeChat.student && activeChat.student.studentId === data.byStudentId;

            if (iAmSender) {
                if (lastMessages[data.byStudentId]) {
                    lastMessages[data.byStudentId].seen      = true;
                    lastMessages[data.byStudentId].delivered = true;
                    lastMessages[data.byStudentId].time      = data.seenAt;
                    updateSidebarItem(data.byStudentId);
                }
                if (chatIsOpen) {
                    removeAllMsgStatus();
                    const allSent = document.querySelectorAll('.msg.sent');
                    if (allSent.length > 0) {
                        const lastSent = allSent[allSent.length - 1];
                        const el = document.createElement('span');
                        el.className = 'msg-status seen-status';
                        el.innerText = `✓✓ Seen ${formatTime(data.seenAt)}`;
                        lastSent.appendChild(el);
                    }
                }
            }
        });

        socket.on('msg-delivered', (data) => {
            if (activeChat && activeChat.type === 'private') {
                const allSent = document.querySelectorAll('.msg.sent');
                allSent.forEach(div => {
                    if (div.dataset.msgId === String(data.msgId)) {
                        const st = div.querySelector('.msg-status');
                        if (st && st.classList.contains('sent-status')) {
                            st.className = 'msg-status delivered-status';
                            st.innerText = '✓✓';
                        }
                    }
                });
                if (allSent.length > 0) {
                    const last = allSent[allSent.length - 1];
                    if (last.dataset.msgId === String(data.msgId)) {
                        const st = last.querySelector('.msg-status');
                        if (st) { st.className = 'msg-status delivered-status'; st.innerText = '✓✓'; }
                    }
                }
            }
            if (activeChat && activeChat.type === 'private') {
                const otherId = activeChat.student.studentId;
                if (lastMessages[otherId]) {
                    lastMessages[otherId].delivered = true;
                    updateSidebarItem(otherId);
                }
            }
        });

        socket.on('force-logout', (data) => {
            alert('⚠️ ' + (data.reason || 'Admin ne logout kiya. Naya QR lo.'));
            logout();
        });

        socket.emit('check-force-logout', { studentId: myData.studentId });

        socket.on('new-group-msg', (data) => {
            const isMe = data.senderStudentId === myData.studentId;
            if (activeChat && activeChat.type === 'group') {
                appendMessage(data.senderName, data.text, data.createdAt, isMe, data._id, false, false, null, false);
                scrollBottom();
            }
        });
    }

    // ========================
    // HELPERS
    // ========================
    function removeAllMsgStatus() {
        document.querySelectorAll('.msg-status').forEach(el => el.remove());
    }

    function getStatusHtml(statusType, seenAt) {
        if (statusType === 'seen')
            return `<span class="msg-status seen-status">✓✓ Seen ${formatTime(seenAt)}</span>`;
        if (statusType === 'delivered')
            return `<span class="msg-status delivered-status">✓✓</span>`;
        return `<span class="msg-status sent-status">✓</span>`;
    }

    function appendMessage(senderName, text, time, isMe, msgId, isDelivered, isRead, seenAt, showStatus) {
        const div     = document.createElement('div');
        div.className = `msg ${isMe ? 'sent' : 'received'}`;
        if (msgId) div.dataset.msgId = msgId;
        const t = new Date(time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        let statusHtml = '';
        if (isMe && showStatus) {
            const st = seenAt ? 'seen' : isDelivered ? 'delivered' : 'sent';
            statusHtml = getStatusHtml(st, seenAt);
        }
        div.innerHTML = `
            ${!isMe ? `<b style="color:#075e54;font-size:12px;">${escHtml(senderName)}</b><br>` : ''}
            ${escHtml(text)}<span class="time">${t}</span>${statusHtml}
        `;
        document.getElementById('messages').appendChild(div);
        return div;
    }

    function scrollBottom() {
        const msgs = document.getElementById('messages');
        msgs.scrollTop = msgs.scrollHeight;
    }

    function formatTime(date) {
        if (!date) return '';
        const d    = new Date(date);
        const diff = Math.floor((Date.now() - d) / 1000 / 60);
        if (diff < 1)    return 'Just now';
        if (diff < 60)   return `${diff}m ago`;
        if (diff < 1440) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return d.toLocaleDateString();
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ========================
    // MOBILE NAVIGATION
    // ========================
    const isMobileView = () => window.innerWidth <= 640;

    function showChat() {
        if (!isMobileView()) return;
        document.getElementById('sidebar').classList.add('hidden-mobile');
        document.getElementById('main-chat').classList.add('show-mobile');
    }

    function goBackToSidebar() {
        document.getElementById('sidebar').classList.remove('hidden-mobile');
        document.getElementById('main-chat').classList.remove('show-mobile');
    }

    window.addEventListener('resize', () => {
        if (!isMobileView()) {
            document.getElementById('sidebar').classList.remove('hidden-mobile');
            document.getElementById('main-chat').classList.remove('show-mobile');
        }
    });
</script>
